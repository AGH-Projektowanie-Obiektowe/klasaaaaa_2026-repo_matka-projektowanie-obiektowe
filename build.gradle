subprojects {
    apply plugin: 'java' // Wszystkie podfoldery to projekty Java

    repositories {
        mavenCentral() // Skąd brać biblioteki (jeśli będziesz ich potrzebować)
    }

    dependencies {
        implementation 'org.jetbrains:annotations:24.0.0'
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25) // Ustaw swoją wersję Javy
        }
    }
}